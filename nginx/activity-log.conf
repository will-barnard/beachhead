# Beachhead activity log — feeds the on-demand (scale-to-zero) idle tracker.
#
# nginx-proxy includes every .conf file in /etc/nginx/conf.d at the http{}
# level, so this adds a second access_log alongside the default stdout one.
# Each line is space-separated and easy to parse:
#   <host> <iso8601-time> <method> <status> <upstream-time>
#
# The file is written into /var/log/nginx-activity, a volume shared with the
# beachhead-api container which tails it via services/activityTracker.js.
log_format beachhead_activity '$host $time_iso8601 $request_method $status $upstream_response_time';
access_log /var/log/nginx-activity/access.log beachhead_activity;
