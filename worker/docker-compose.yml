services:
  beachhead-worker:
    build: .
    container_name: beachhead-worker
    restart: unless-stopped
    environment:
      # Single server
      - BEACHHEAD_URL=${BEACHHEAD_URL:-}
      - BEACHHEAD_TOKEN=${BEACHHEAD_TOKEN:-}
      # Multiple servers ‚Äî comma-separated (recommended for .env files)
      - BEACHHEAD_URLS=${BEACHHEAD_URLS:-}
      - BEACHHEAD_TOKENS=${BEACHHEAD_TOKENS:-}
      # Multiple servers ‚Äî JSON array (alternative)
      - BEACHHEAD_SERVERS=${BEACHHEAD_SERVERS:-}
      - BEACHHEAD_WORKER_ID=${BEACHHEAD_WORKER_ID:-worker-01}
      - BEACHHEAD_POLL_INTERVAL=${BEACHHEAD_POLL_INTERVAL:-5000}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - SSH_PRIVATE_KEY=${SSH_PRIVATE_KEY:-}
      - BEACHHEAD_BUILD_PLATFORM=${BEACHHEAD_BUILD_PLATFORM:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
