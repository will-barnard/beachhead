services:
  beachhead:
    build: .
    container_name: beachhead-api
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3000:3000"   # direct access for health checks during install
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DEPLOY_BASE_DIR=/var/beachhead/deployments
      - DOCKER_NETWORK=beachhead-net
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - AUTH_JWKS_URL=${AUTH_JWKS_URL:-}
      - AUTH_ISSUER=${AUTH_ISSUER:-}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-brew_token}
      - VIRTUAL_HOST=${BEACHHEAD_DOMAIN}
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=${BEACHHEAD_DOMAIN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deployments:/var/beachhead/deployments
      - ./.env:/app/.env.host
    depends_on:
      beachhead-db:
        condition: service_healthy
    networks:
      - beachhead-net

  beachhead-db:
    image: postgres:16-alpine
    container_name: beachhead-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=beachhead
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-beachhead}
      - POSTGRES_DB=beachhead
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beachhead"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - beachhead-net

  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.5
    container_name: beachhead-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    networks:
      - beachhead-net

  letsencrypt:
    image: nginxproxy/acme-companion:2.4
    container_name: beachhead-letsencrypt
    restart: unless-stopped
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
      - NGINX_PROXY_CONTAINER=beachhead-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    depends_on:
      - nginx-proxy
    networks:
      - beachhead-net

volumes:
  pgdata:
  deployments:
  certs:
  html:
  acme:

networks:
  beachhead-net:
    external: true
