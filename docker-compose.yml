services:
  beachhead:
    build: .
    container_name: beachhead-api
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3000:3000"   # direct access for health checks during install
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      # Host and container paths MUST match — the in-container code spawns
      # `docker compose` against the host docker daemon, which sees these
      # paths as host paths.
      - DEPLOY_BASE_DIR=${DEPLOY_BASE_DIR:-/var/beachhead/deployments}
      - DOCKER_NETWORK=beachhead-net
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - AUTH_JWKS_URL=${AUTH_JWKS_URL:-}
      - AUTH_ISSUER=${AUTH_ISSUER:-}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-brew_token}
      - VIRTUAL_HOST=${BEACHHEAD_DOMAIN}
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=${BEACHHEAD_DOMAIN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the deploy dir at the same path inside the container as on the
      # host so paths in compose commands match across the boundary.
      - ${DEPLOY_BASE_DIR:-/var/beachhead/deployments}:${DEPLOY_BASE_DIR:-/var/beachhead/deployments}
      - ./.env:/app/.env.host
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      # Read nginx-proxy's access log (shared volume below) for the
      # on-demand activity tracker.
      - nginx-activity:/var/log/nginx-activity:ro
    depends_on:
      beachhead-db:
        condition: service_healthy
    networks:
      - beachhead-net

  beachhead-db:
    image: postgres:16-alpine
    container_name: beachhead-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=beachhead
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-beachhead}
      - POSTGRES_DB=beachhead
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beachhead"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - beachhead-net

  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.5
    container_name: beachhead-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      # Drop a second access_log into nginx-proxy's http{} so the Beachhead
      # activity tracker can detect inbound traffic per host. Read-only —
      # nginx-proxy only includes it; Beachhead never writes to this conf.
      - ./nginx/activity-log.conf:/etc/nginx/conf.d/beachhead-activity.conf:ro
      # The log itself goes here — read-write for nginx-proxy, read-only
      # for beachhead-api (mounted above).
      - nginx-activity:/var/log/nginx-activity
    networks:
      - beachhead-net

  letsencrypt:
    image: nginxproxy/acme-companion:2.4
    container_name: beachhead-letsencrypt
    restart: unless-stopped
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
      - NGINX_PROXY_CONTAINER=beachhead-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - ./nginx/vhost.d:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    depends_on:
      - nginx-proxy
    networks:
      - beachhead-net

volumes:
  pgdata:
  certs:
  html:
  acme:
  nginx-activity:

networks:
  beachhead-net:
    external: true
